proxy-groups:
  - name: AI
    type: url-test
    proxies:
      [
        "🇯🇵日本 01 | 高级专线",
        "🇯🇵日本 02 | 高级专线",
        "🇯🇵日本 03 | 高级专线",
        "🇯🇵日本 04 | 高级专线",
        "🇯🇵日本 05 | 高级专线",
        "🇯🇵日本 06 | 高级专线",
        "🇯🇵日本 07 | 高级专线",
        "🇯🇵日本 08 | 高级专线",
        "🇯🇵日本 09 | 高级专线",
        "🇯🇵日本 10 | 高级专线",
      ]
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80

  - name: PROXY
    type: url-test
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 80

rules:
  - RULE-SET,applications,DIRECT
  - RULE-SET,private,DIRECT
#  - RULE-SET,reject,REJECT

  - RULE-SET,ai,AI

  - RULE-SET,custom-proxy,PROXY
  - RULE-SET,harbour-proxy,my-socks

  - RULE-SET,gfw,PROXY
  - RULE-SET,telegramcidr,PROXY

  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,DIRECT
rule-providers:
  custom-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://gitee.com/kain-zhang/proxy-rules/raw/master/custom-proxy.yaml"
    path: ./ruleset/custom-proxy.yaml
    interval: 86400

  harbour-proxy:
    type: http
    behavior: classical
    format: yaml
    url: "https://gitee.com/kain-zhang/proxy-rules/raw/master/harbour-proxy.yaml"
    path: ./ruleset/harbour-proxy.yaml
    interval: 86400

  ai:
    type: http
    behavior: domain
    format: mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ai-!cn.mrs
    path: ./ruleset/ai.mrs
    interval: 86400

#  reject:
#    type: http
#    behavior: domain
#    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
#    path: ./ruleset/reject.yaml
#    interval: 86400

#  proxy:
#    type: http
#    behavior: domain
#    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
#    path: ./ruleset/proxy.yaml
#    interval: 86400
#
  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400


